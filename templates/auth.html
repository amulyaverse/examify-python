{% extends "base.html" %}

{% block content %}
<style>
.auth-container {
    padding: 8rem 0 4rem;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 80px);
}
.auth-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 400px;
    padding: 2rem;
    border: 1px solid var(--border);
}
.auth-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
}
.auth-tab {
    flex: 1;
    text-align: center;
    padding: 1rem;
    cursor: pointer;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
}
.auth-tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
}

.auth-form {
    display: none;
    animation: fadeInUp 0.3s ease-out;
}
.auth-form.active {
    display: block;
}
</style>

<div class="container auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
        </div>
        
        <!-- Login Form -->
        <form action="{{ url_for('auth') }}" method="POST" id="form-login" class="auth-form active">
            <input type="hidden" name="action" value="login">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        
        <!-- Register Form -->
        <form action="{{ url_for('auth') }}" method="POST" id="form-register" class="auth-form">
            <input type="hidden" name="action" value="register">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-input" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
    </div>
</div>

<script>
function switchTab(tab) {
    // Update tabs
    document.getElementById('tab-login').classList.remove('active');
    document.getElementById('tab-register').classList.remove('active');
    document.getElementById('tab-' + tab).classList.add('active');
    
    // Update forms
    document.getElementById('form-login').classList.remove('active');
    document.getElementById('form-register').classList.remove('active');
    document.getElementById('form-' + tab).classList.add('active');
}
</script>
{% endblock %}
