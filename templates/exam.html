{% extends "base.html" %}

{% block content %}
<style>
.exam-container {
    max-width: 800px;
    margin: 0 auto;
    padding: 8rem 0 4rem;
}
.exam-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 2.5rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow-sm);
}
.question-text {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
    line-height: 1.6;
}
.options-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.option-label {
    display: flex;
    align-items: center;
    padding: 1rem 1.5rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--background);
}
.option-label:hover {
    border-color: var(--primary);
    background: rgba(37, 99, 235, 0.05);
}
.option-input {
    margin-right: 1.25rem;
    transform: scale(1.3);
}
.timer-container {
    position: fixed;
    top: 6rem;
    right: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.5rem;
    box-shadow: var(--shadow-md);
    z-index: 100;
}
.timer-text {
    font-size: 1.5rem;
    font-weight: 800;
    color: #ef4444;
    font-variant-numeric: tabular-nums;
}
</style>

<div class="container exam-container">
    <div class="timer-container">
        <div style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 0.25rem;">Time Remaining</div>
        <div class="timer-text" id="timer">--:--</div>
    </div>

    <form action="{{ url_for('take_exam', exam_id=exam.id) }}" method="POST" id="exam-form">
        <h2 class="mb-8">{{ exam.title }}</h2>
        
        {% for q in questions %}
        <div class="exam-card">
            <div class="question-text">
                <span style="font-size: 0.9rem; color: var(--primary); font-weight: bold; display: block; margin-bottom: 0.75rem;">Question {{ loop.index }}</span>
                {{ q.question }}
            </div>
            
            <div class="options-list">
                {% for option in q.options %}
                <label class="option-label">
                    <input type="radio" name="question_{{ q.id }}" value="{{ option }}" class="option-input" required>
                    <span>{{ option }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; font-size: 1.1rem; font-weight: 600;">
            Submit Exam
        </button>
    </form>
</div>

<script>
    const durationMins = {{ exam.duration }};
    let timeRemaining = durationMins * 60;
    const timerDisplay = document.getElementById('timer');
    const examForm = document.getElementById('exam-form');
    
    function updateTimer() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = Math.floor(timeRemaining % 60);
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            alert("Time is up! Submitting your exam.");
            examForm.submit();
        }
        timeRemaining--;
    }
    
    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);
</script>
{% endblock %}
